title: "Image Block Example"
subtitle: "Demonstrating docsmith image embedding"
status: "Draft"

content:
  - heading: "Introduction"
  - text: "This document demonstrates the new **image block** feature in docsmith."

  - heading:
      text: "Architecture Diagram"
      level: 2
  - text: "Below is an example diagram embedded as a PNG image with a caption and center alignment:"
  - image:
      path: "example_diagram.png"
      width: 4.0
      alignment: center
      caption: "Figure 1: Example architecture diagram"

  - heading:
      text: "Image Options"
      level: 2
  - text: "The image block supports the following options:"
  - table:
      headers: ["Option", "Required", "Default", "Description"]
      rows:
        - ["path", "Yes", "-", "File path relative to the YAML file"]
        - ["width", "No", "5.0", "Width in inches (aspect ratio preserved)"]
        - ["alignment", "No", "left", "left, center, or right"]
        - ["caption", "No", "-", "Caption text displayed below the image"]

  - heading:
      text: "Conclusion"
      level: 2
  - text: "Images can be *PNG* or *JPEG* format. Invalid paths produce clear error messages."